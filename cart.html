<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart - Lunera Coffee</title>
<link rel="stylesheet" href="style.css">
    <style>
        /* تنسيق الصفحة */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdfaf7; color: #4a3c31; margin: 0; padding: 20px; }
        
        .cart-wrapper { max-width: 500px; margin: 40px auto; background: #fff; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        h2 { text-align: center; color: #6F4E37; border-bottom: 2px solid #f1ece8; padding-bottom: 15px; }

        /* تنسيق المنتجات داخل السلة */
        #cart-items-container { margin-top: 20px; }
        
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #f1ece8; }
        
        .item-details { display: flex; flex-direction: column; }
        
        .item-name { font-weight: 600; font-size: 1.1em; }
        
        .item-qty { font-size: 0.85em; color: #9a8473; }

        /* المجموع */
        .total-box { margin-top: 25px; display: flex; justify-content: space-between; font-size: 1.3em; font-weight: bold; color: #333; }

        /* الأزرار */
        .checkout-btn { width: 100%; background: #6F4E37; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1em; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .checkout-btn:hover { background: #6a513e; }

        .back-btn { display: block; text-align: center; margin-top: 15px; color: #9a8473; text-decoration: none; font-size: 0.9em; }
    </style>
</head>

    <header>
        <div> 
            <img src="logooo.png" alt="Lunèra coffee" width="100" height="95">
            </div>
            <div>
                <ul>
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="aboutus.html">ABOUT</a></li>
                    <li><a href="service.html">SERVICE</a></li>
                    <li><a href="menu.html">MENU</a></li>
                    <li><a href="FAQ.html">FAQ</a></li>
                    <li><a href="Contectus.html">CONTACT US</a></li>
                      <li><a href="cart.html">CART</a></li>



                    

                </ul>
            </div>
    </header>
<body>

    <div class="cart-wrapper">
        <h2>Your Cart ☕</h2>

        <div id="cart-items-container">
            <p style="text-align: center; color: #ccc;">Loading your treats...</p>
        </div>

        <div class="total-box">
            <span>Total:</span>
            <span id="cart-total">0.000 BD</span>
        </div>

        <button class="checkout-btn" onclick="confirmOrder()">Confirm Order</button>
        <a href="menu.html" class="back-btn">← Continue Shopping</a>
    </div>

    <script src="coffee.js"></script>

</body>
</html>
